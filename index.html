<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta tag-uri pentru WhatsApp Preview -->
    <meta property="og:title" content="Campanie Vară 2026 - SSIC">
    <meta property="og:description" content="Planificarea și coordonarea activităților SSIC.">
    <meta property="og:image" content="https://prssic.github.io/placeholder_github.png">
    <meta property="og:url" content="https://prssic.github.io/">
    <meta property="og:type" content="website">

    <title>Campanie Vară 2026 - SSIC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root {
            /* PALETA OFICIALĂ SSIC & HYPERSPACE THEME */
            --ssic-main: #1a0526;
            --ssic-accent: #f5ba42;
            --text-main: #f8fafc;
            --text-sub: #a78bfa;
            
            /* FUNDAL COSMIC DEEP SPACE */
            --bg-base: #06010b;
            --modal-overlay: rgba(6, 1, 11, 0.4);

            /* PARAMETRI FAST LIQUID GLASS */
            --glass-bg: rgba(26, 7, 38, 0.35);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --glass-blur: 16px;

            /* TIP CONȚINUT - ACCENTE NEON */
            --color-postare: #00d2ff;
            --color-reel: #ff0055;
            --color-story: #a855f7;
            --color-unknown: #475569;

            /* RESPONSABILI */
            --resp-patru: #ff2a2a;         
            --resp-erica: #ff007f;         
            --resp-mihai: #3b82f6;         
            --resp-mihai-erica: #f5ba42;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            
            /* GRADIENT SUBTIL ÎN MIȘCARE */
            background: linear-gradient(135deg, #06010b 0%, #1a0526 40%, #2f0e3d 60%, #170221 80%, #06010b 100%);
            background-size: 300% 300%;
            background-color: var(--bg-base);
            animation: shiftGradient 25s ease-in-out infinite;
        }

        @keyframes shiftGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CANVAS FURNIZAT PENTRU PARTICULE ȘI PLOAIE GRAVITAȚIONALĂ */
        #particlesCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999; /* Ridicat pentru ca numerele să sară peste tot textul */
        }

        /* LOGO FILIGRAN - ROTAȚIE 3D PE AXA VERTICALĂ SUBTILĂ */
        .bg-logo {
            position: fixed;
            top: 50%; left: 50%;
            width: 80vmin; height: 80vmin;
            margin-top: -40vmin; margin-left: -40vmin;
            background-image: url('logo_1.png');
            background-size: contain; background-position: center; background-repeat: no-repeat;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
            animation: spinLogoVertical 18s linear infinite;
        }

        @keyframes spinLogoVertical {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* ANIMAȚIE PRELOADER */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-base); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        .loader-logo {
            width: 120px; height: 120px; object-fit: contain;
            animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(168, 85, 247, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(168, 85, 247, 0)); }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            position: relative;
            z-index: 1;
        }

        /* BUTON PROIECT NOU */
        .floating-controls {
            position: absolute;
            top: 0; right: 0;
            z-index: 10;
        }

        .action-btn {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            outline: none;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            border-color: var(--ssic-accent);
            background: rgba(168, 85, 247, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 680px) {
            .floating-controls { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 25px; top: 0; right: 0; }
        }

        /* HEADER */
        header {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 50px; margin-top: 10px; text-align: center; flex-wrap: wrap;
        }

        header h1 { 
            font-size: 3.2rem; 
            font-weight: 800; 
            letter-spacing: -0.02em; 
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }
        .header-logo { width: 75px; height: 75px; object-fit: contain; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        header:hover .header-logo { transform: scale(1.1) rotate(5deg); }

        @media (max-width: 650px) {
            header h1 { font-size: 2.2rem; }
            .header-logo { width: 50px; height: 50px; }
            header { gap: 15px; }
        }

        /* ====================================================
           NATIVE LIQUID GLASS
           ==================================================== */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(var(--glass-blur)) saturate(1.2);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.2);
            margin-bottom: 40px;
            padding: 24px;
            will-change: transform;
            transform: translateZ(0);
            position: relative;
            overflow: hidden;
        }

        /* LEGENDĂ */
        .legend-container-inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; }
        @media (max-width: 768px) { .legend-container-inner { flex-direction: column; gap: 20px; } }
        
        .legend-block { flex: 1; }
        .legend-block h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ssic-accent); margin-bottom: 12px; font-weight: 700; opacity: 0.9;}
        .legend-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        
        .legend-pill { 
            display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; 
            padding: 6px 12px; background: rgba(255, 255, 255, 0.02); 
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: background 0.2s;
        }
        .legend-pill:hover { background: rgba(255, 255, 255, 0.05); }
        
        .color-preview { width: 12px; height: 12px; border-radius: 4px; margin-right: 8px; }
        .dot-preview { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; border: 1.5px solid rgba(255,255,255,0.7); }
        
        /* CALENDAR STRUCTURE */
        .month-header {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--ssic-accent);
            text-shadow: 0 2px 10px rgba(245, 186, 66, 0.2);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* CARDURI CALENDAR */
        .event-card {
            position: relative;
            border-radius: 16px;
            padding: 20px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(20, 5, 30, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }
        
        .event-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .date-badge { font-size: 1.2rem; font-weight: 800; color: #fff;}
        .event-title { font-size: 1rem; font-weight: 700; line-height: 1.4; margin-bottom: 16px; flex-grow: 1; color: #fff; }
        
        .card-bottom { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 14px; border-top: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .type-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .status-badge { 
            font-size: 0.65rem; font-weight: 700; padding: 4px 10px; 
            border-radius: 12px; background: rgba(245, 186, 66, 0.1); 
            color: var(--ssic-accent); border: 1px solid rgba(245, 186, 66, 0.2); 
            text-transform: uppercase; letter-spacing: 0.02em;
        }

        /* BULINE RESPONSABILI */
        .resp-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 2px solid rgba(255,255,255,0.8); }
        .dot-patru { background-color: var(--resp-patru); box-shadow: 0 0 10px rgba(255, 42, 42, 0.5); }
        .dot-erica { background-color: var(--resp-erica); box-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .dot-mihai { background-color: var(--resp-mihai); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .dot-mihai-erica { background-color: var(--resp-mihai-erica); box-shadow: 0 0 10px rgba(245, 186, 66, 0.5); }

        /* BORDERS TIP POSTARE (MARGINI NEON STÂNGA) */
        .card-postare { border-left: 4px solid var(--color-postare); } .card-postare .type-label { color: var(--color-postare); }
        .card-reel { border-left: 4px solid var(--color-reel); } .card-reel .type-label { color: var(--color-reel); }
        .card-story { border-left: 4px solid var(--color-story); } .card-story .type-label { color: var(--color-story); }
        .card-nespecificat { border-left: 4px solid var(--color-unknown); } .card-nespecificat .type-label { color: var(--text-sub); }

        .card-postare:hover { border-color: var(--color-postare); }
        .card-reel:hover { border-color: var(--color-reel); }
        .card-story:hover { border-color: var(--color-story); }

        /* ====================================================
           MODALE ELEGANT & TRANSPARENTE
           ==================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            position: relative; border-radius: 20px;
            padding: 24px; width: 92%; max-width: 400px;
            transform: scale(0.95); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; flex-direction: column; align-items: center;
            background: rgba(26, 7, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
        }

        .modal-overlay.active .modal-box { transform: scale(1); }
        
        .modal-logo { width: 45px; height: 45px; margin-bottom: 12px; object-fit: contain; }
        .close-btn { position: absolute; top: 16px; right: 18px; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1.8rem; cursor: pointer; font-weight: 300; line-height: 1; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }
        
        .modal-box h2 { font-size: 1.25rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .target-task-name { font-size: 0.8rem; color: var(--ssic-accent); font-weight: 700; margin-bottom: 16px; background: rgba(245, 186, 66, 0.1); padding: 4px 12px; border-radius: 6px; text-align: center; }
        
        .form-container-width { width: 100%; }
        .form-row-twin { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.08em; }
        
        .form-group input, .form-group textarea {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 14px; border-radius: 10px; color: var(--text-main);
            font-family: inherit; font-size: 0.9rem; outline: none; width: 100%; transition: border-color 0.2s, background 0.2s;
        }

        .form-group textarea { resize: none; height: 80px; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--ssic-accent); background: rgba(255, 255, 255, 0.06); }

        .submit-btn {
            background: var(--ssic-accent); border: none; color: #1a0526;
            padding: 14px 24px; font-size: 0.9rem; font-weight: 800; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(245, 186, 66, 0.2);
            width: 100%; margin-top: 8px; transition: transform 0.2s ease, background 0.2s;
        }
        .submit-btn:hover { transform: scale(1.02); background: #fbc760; }
    </style>
</head>
<body>

<canvas id="particlesCanvas"></canvas>
<div id="preloader"><div class="loader-content"><img src="logo_1.png" alt="" class="loader-logo" onerror="this.style.display='none'"></div></div>
<div class="bg-logo"></div>

<div class="container">
    <div class="floating-controls"><button class="action-btn" onclick="openProposalModal()">💡 Idei noi SSIC</button></div>

    <header>
        <img src="logo_2.png" alt="" class="header-logo" id="easterEggLogo" onerror="this.style.display='none'">
        <h1 id="easterEggTitle">Campanie Vară 2026</h1>
    </header>
    
    <!-- Restul conținutului tău rămâne identic... -->
</div>
<script> /* Scripturile rămân identice, cu logica de Easter Egg intactă... */ </script>
</body>
</html>
